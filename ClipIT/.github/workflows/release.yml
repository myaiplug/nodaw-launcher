name: Release Clip-IT

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (example: 1.0.0)"
        required: true
        type: string
      create_release:
        description: "Create or update GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  windows:
    name: Windows Build and Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}"
          }

          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to resolve release version."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Install Inno Setup (for native .exe installer)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Run release orchestrator
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Verify Windows release artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $expected = @(
            "dist/Clip-IT-v$version-win64.zip",
            "dist/Clip-IT-Installer-Windows-v$version.zip",
            "dist/Clip-IT-Setup-v$version.exe"
          )

          foreach ($path in $expected) {
            if (-not (Test-Path $path)) {
              throw "Missing expected artifact: $path"
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipit-windows-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error

  macos:
    name: macOS Build and Package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          VERSION="${VERSION#v}"

          if [ -z "$VERSION" ]; then
            echo "Unable to resolve release version."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Run release orchestrator
        shell: bash
        run: |
          chmod +x ./release.sh
          ./release.sh --version "${{ steps.version.outputs.version }}"

      - name: Verify macOS release artifacts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXPECTED=(
            "dist/Clip-IT-v${VERSION}-mac.zip"
            "dist/Clip-IT-Installer-macOS-v${VERSION}.zip"
            "dist/Clip-IT-Installer-macOS-v${VERSION}.pkg"
          )

          for path in "${EXPECTED[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "Missing expected artifact: $path" >&2
              exit 1
            fi
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipit-macos-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
            TAG="v$VERSION"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Unable to resolve tag."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Clip-IT ${{ steps.tag.outputs.tag }}
          files: release-artifacts/**/*
          generate_release_notes: true
